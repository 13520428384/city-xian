  { id: 'ca-x-69', district: '长安区', area: '王莽街道', type: '小学', name: '王莽街道汤房庙小学', scope: '（1）孟家村、王家村、江柳村、东新庄村、上三官堂村、下三官堂村。（2）太乙宫街道东升村、吴家沟村。', note: '', phone: '' },
  { id: 'ca-x-70', district: '长安区', area: '王莽街道', type: '小学', name: '王莽街道九年制学校（小学）', scope: '西王莽村、东王莽村、清禅寺村、上三官堂村、下三官堂村、水寨村、刘秀村。', note: '', phone: '' },
  { id: 'ca-x-71', district: '长安区', area: '杨庄街道', type: '小学', name: '杨庄街道中心学校', scope: '（1）驻杨庄街道各单位职工子女。（2）杨庄村、营沟村、李家山村、付家塬村、高山庙村、小庙村, 陈家岩、北佛沟、南佛沟、侯官寨村、上堡子村。', note: '', phone: '' },
  { id: 'ca-x-72', district: '长安区', area: '杨庄街道', type: '小学', name: '杨庄街道石佛庄小学', scope: '石佛庄村、凤翔沟村、大寨村、井家湾村、汪庄村、魏家岭村。', note: '', phone: '' },
  { id: 'ca-x-73', district: '长安区', area: '杨庄街道', type: '小学', name: '杨庄街道库峪口小学', scope: '库峪口村、小寨村、虎峪村、十里庙村、西木斯村、红庙子村、扯袍峪村。', note: '', phone: '' },
  { id: 'ca-x-74', district: '长安区', area: '五台街道', type: '小学', name: '五台街道中心学校', scope: '留村、星火村、西尧村、东尧村、团结村、石砭峪村社区及驻街道有关单位。', note: '', phone: '' },
  { id: 'ca-x-75', district: '长安区', area: '五台街道', type: '小学', name: '五台街道东五联合小学', scope: '东甘村、西甘村、华家新村、新农村及驻街道有关单位。', note: '', phone: '' },
  { id: 'ca-x-76', district: '长安区', area: '滦镇街道', type: '小学', name: '滦镇街道中心学校', scope: '新一村、新二村、陈村、沣峪口村、姚家滩村、原喂子坪所辖村（不含碌碡坪、大坪村）、新一村管辖小区、路桥家属院。', note: '', phone: '' },
  { id: 'ca-x-77', district: '长安区', area: '滦镇街道', type: '小学', name: '滦镇街道新区小学', scope: '小新村、上王村、碌碡坪村、大坪村、新型社区小区、滦镇东街社区（路桥家属院除外）、北八元村。', note: '', phone: '' },
  { id: 'ca-x-78', district: '长安区', area: '滦镇街道', type: '小学', name: '滦镇街道王寨小学', scope: '西王村、东王村，乔良寨村、党旗寨村、白杨寨村、杨家庄村、王里村、酒务头村、南八元村、西石村、东石村。', note: '', phone: '' },
  { id: 'ca-x-79', district: '长安区', area: '滦镇街道', type: '小学', name: '滦镇街道西留小学', scope: '西留堡村、东留堡村、小留堡村、红庙村、官堰村。', note: '', phone: '' },
  { id: 'ca-x-80', district: '长安区', area: '滦镇街道', type: '小学', name: '滦镇街道滦村小学', scope: '上滦村、下滦村、徐家巷村、翁家寨村、黄峪寺村。', note: '', phone: '' },
  { id: 'ca-x-81', district: '长安区', area: '滦镇街道', type: '小学', name: '滦镇街道内苑小学', scope: '内苑村、花园村。', note: '', phone: '' },
  { id: 'ca-x-82', district: '长安区', area: '滦镇街道', type: '小学', name: '滦镇街道鸭池口小学', scope: '鸭池口村', note: '', phone: '' },
  { id: 'ca-x-83', district: '长安区', area: '滦镇街道', type: '小学', name: '滦镇街道泉子头小学', scope: '泉子头村、施张村、兴张村。', note: '', phone: '' },
  { id: 'ca-x-84', district: '长安区', area: '滦镇街道', type: '小学', name: '滦镇街道乔村小学', scope: '乔村。', note: '', phone: '' },
  { id: 'ca-x-85', district: '长安区', area: '滦镇街道', type: '小学', name: '滦镇街道祥峪小学', scope: '祥峪沟村、祥峪口村、大寺新村、惊驾村、水磨村、降南村。', note: '', phone: '' },
  { id: 'ca-x-86', district: '长安区', area: '滦镇街道', type: '小学', name: '祥峪九年制学校（小学）', scope: '罗汉洞村、南石村、北石村、东石村、新联村、降南村。', note: '', phone: '' },
  { id: 'ca-x-87', district: '长安区', area: '子午街道', type: '小学', name: '子午街道中心学校', scope: '子午镇村、子午西片社区、杜角镇村（含西村、北豆角村、南豆角村）。', note: '', phone: '' },
  { id: 'ca-x-88', district: '长安区', area: '子午街道', type: '小学', name: '子午街道曹村小学', scope: '子午东片社区（含东水寨、西水寨、石砭口村）、百塔寺村（含天子口村、天子峪村、王庄村）、曹村、甫店、九村、七里坪村、抱龙峪村。', note: '', phone: '' },
  { id: 'ca-x-89', district: '长安区', area: '子午街道', type: '小学', name: '子午街道张村小学', scope: '子午张村。', note: '', phone: '' },
  { id: 'ca-x-90', district: '长安区', area: '子午街道', type: '小学', name: '子午街道东村小学', scope: '子午东村、台沟村、抱石村。', note: '', phone: '' },
        ];

        function App() {
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedDistrict, setSelectedDistrict] = useState('全部区域');
            const [selectedArea, setSelectedArea] = useState('所在街道/片区');
            const [showScrollTop, setShowScrollTop] = useState(false);

            const districts = useMemo(() => ['全部区域', ...new Set(SCHOOL_DATA.map(item => item.district))], []);
            
            const areas = useMemo(() => {
                let filteredForArea = SCHOOL_DATA;
                if (selectedDistrict !== '全部区域') {
                filteredForArea = SCHOOL_DATA.filter(item => item.district === selectedDistrict);
                }
                const areaSet = new Set(filteredForArea.map(item => item.area));
                return ['所在街道/片区', ...Array.from(areaSet).sort()];
            }, [selectedDistrict]);

            const handleDistrictChange = (e) => {
                setSelectedDistrict(e.target.value);
                setSelectedArea('所在街道/片区');
            };

            const filteredData = useMemo(() => {
                const lowerSearchTerm = searchTerm.toLowerCase().trim();
                return SCHOOL_DATA.filter(item => {
                if (selectedDistrict !== '全部区域' && item.district !== selectedDistrict) return false;
                if (selectedArea !== '所在街道/片区' && item.area !== selectedArea) return false;
                if (lowerSearchTerm) {
                    return (
                    item.name.toLowerCase().includes(lowerSearchTerm) ||
                    item.scope.toLowerCase().includes(lowerSearchTerm) ||
                    (item.note && item.note.toLowerCase().includes(lowerSearchTerm))
                    );
                }
                return true;
                });
            }, [searchTerm, selectedDistrict, selectedArea]);

            const displayLimit = 50;
            const displayData = filteredData.slice(0, displayLimit);

            const highlightText = (text, highlight) => {
                if (!highlight.trim() || !text) return text;
                const parts = text.split(new RegExp(`(${highlight})`, 'gi'));
                return parts.map((part, index) =>
                part.toLowerCase() === highlight.toLowerCase() ? (
                    <span key={index} className="bg-yellow-200 text-yellow-800 rounded px-0.5 font-bold">{part}</span>
                ) : (
                    part
                )
                );
            };

            useEffect(() => {
                const handleScroll = () => setShowScrollTop(window.scrollY > 300);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="min-h-screen bg-gray-50 font-sans text-gray-800 pb-10">
                <header className="bg-blue-600 text-white p-5 shadow-lg relative overflow-hidden">
                    <div className="absolute -right-10 -top-10 w-40 h-40 bg-blue-500 rounded-full opacity-20"></div>
                    <h1 className="text-xl font-bold flex items-center justify-center gap-2 relative z-10">
                    <School className="w-6 h-6" />
                    西安市学区划分查询系统
                    </h1>
                    <p className="text-blue-100 text-xs text-center mt-2 opacity-90 relative z-10">
                    官方2025年最新数据 · 智能查询
                    </p>
                </header>

                <div className="sticky top-0 z-30 bg-gray-50 shadow-md p-4 space-y-3">
                    <div className="relative group">
                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400 group-focus-within:text-blue-500 transition-colors">
                        <Search className="h-5 w-5" />
                    </div>
                    <input
                        type="text"
                        className="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-xl bg-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all shadow-sm"
                        placeholder="搜索小区、村庄或学校..."
                        value={searchTerm}
                        onChange={(e) => setSearchTerm(e.target.value)}
                    />
                    </div>

                    <div className="flex gap-2">
                    <select
                        className="block w-1/2 pl-3 pr-8 py-2.5 text-sm border border-gray-200 bg-white rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm appearance-none cursor-pointer"
                        value={selectedDistrict}
                        onChange={handleDistrictChange}
                        style={{ backgroundImage: `url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e")`, backgroundPosition: 'right .5rem center', backgroundRepeat: 'no-repeat', backgroundSize: '1.5em 1.5em' }}
                    >
                        {districts.map(d => <option key={d} value={d}>{d}</option>)}
                    </select>
                    <select
                        className="block w-1/2 pl-3 pr-8 py-2.5 text-sm border border-gray-200 bg-white rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm appearance-none cursor-pointer"
                        value={selectedArea}
                        onChange={(e) => setSelectedArea(e.target.value)}
                        style={{ backgroundImage: `url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e")`, backgroundPosition: 'right .5rem center', backgroundRepeat: 'no-repeat', backgroundSize: '1.5em 1.5em' }}
                    >
                        {areas.map(a => <option key={a} value={a}>{a}</option>)}
                    </select>
                    </div>
                </div>

                <main className="px-4 mt-3 max-w-2xl mx-auto">
                    <div className="flex justify-between items-center mb-3 text-xs text-gray-500">
                    <span>共找到 {filteredData.length} 项记录</span>
                    {filteredData.length > displayLimit && (
                        <span className="text-orange-600 bg-orange-50 px-2 py-0.5 rounded-full flex items-center gap-1 font-medium border border-orange-100">
                        <AlertCircle className="w-3 h-3" />
                        仅显示前 {displayLimit} 条
                        </span>
                    )}
                    </div>

                    <div className="space-y-4">
                    {displayData.length === 0 ? (
                        <div className="text-center py-20 bg-white rounded-2xl border border-dashed border-gray-200">
                        <School className="mx-auto w-12 h-12 text-gray-300 mb-3" />
                        <p className="text-gray-500">未找到符合条件的学区数据</p>
                        <button onClick={() => {setSearchTerm(''); setSelectedDistrict('全部区域'); setSelectedArea('所在街道/片区');}} className="text-blue-600 text-sm mt-2 underline">清空搜索条件</button>
                        </div>
                    ) : (
                        displayData.map((item) => (
                        <div key={item.id} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden active:scale-[0.98] transition-transform">
                            <div className="p-4 bg-gradient-to-r from-blue-50/80 to-transparent border-b border-gray-50">
                            <div className="flex justify-between items-start">
                                <h2 className="text-lg font-bold text-gray-900 leading-tight">
                                {highlightText(item.name, searchTerm)}
                                </h2>
                                <span className={`shrink-0 ml-2 px-2 py-1 rounded text-[10px] font-bold border ${
                                item.type === '小学' ? 'bg-blue-100 text-blue-700 border-blue-200' : 
                                item.type === '初中' ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : 
                                'bg-purple-100 text-purple-700 border-purple-200'
                                }`}>
                                {item.type}
                                </span>
                            </div>
                            <div className="flex gap-2 mt-2">
                                <span className="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full font-medium">
                                {item.district}
                                </span>
                                <span className="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full font-medium">
                                {item.area}
                                </span>
                            </div>
                            </div>

                            <div className="p-4 space-y-3">
                            <div className="flex gap-2">
                                <MapPin className="w-4 h-4 text-blue-500 shrink-0 mt-0.5" />
                                <p className="text-[13px] text-gray-700 leading-relaxed">
                                <span className="font-bold text-gray-900">学区范围：</span>
                                {highlightText(item.scope, searchTerm)}
                                </p>
                            </div>

                            {item.note && (
                                <div className="bg-orange-50/50 p-3 rounded-xl border border-orange-100/50">
                                <div className="flex gap-2">
                                    <Info className="w-4 h-4 text-orange-500 shrink-0 mt-0.5" />
                                    <p className="text-[12px] text-orange-800 leading-relaxed">
                                    <span className="font-bold">重要备注：</span>
                                    {highlightText(item.note, searchTerm)}
                                    </p>
                                </div>
                                </div>
                            )}

                            {item.phone && (
                                <div className="pt-2 border-t border-gray-50 flex items-center justify-between">
                                <div className="flex items-center gap-2">
                                    <Phone className="w-4 h-4 text-green-500" />
                                    <span className="text-xs font-medium text-gray-500">咨询电话</span>
                                </div>
                                <a href={`tel:${item.phone.split(' ')[0]}`} className="text-sm font-bold text-blue-600 bg-blue-50 px-3 py-1.5 rounded-full hover:bg-blue-100 transition-colors">
                                    {item.phone}
                                </a>
                                </div>
                            )}
                            </div>
                        </div>
                        ))
                    )}
                    </div>
                </main>

                {showScrollTop && (
                    <button
                    onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
                    className="fixed bottom-6 right-6 p-4 bg-blue-600 text-white rounded-full shadow-2xl active:bg-blue-700 z-50 transition-all scale-110"
                    >
                    <ChevronUp className="w-6 h-6" />
                    </button>
                )}
                </div>
            );
            }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
